<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消防點名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .status-btn { 
            font-size: 13px; 
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background-color: white;
            color: #94a3b8;
            transition: all 0.1s ease;
        }
        .active-present { background-color: #22c55e !important; color: white !important; border-color: #16a34a !important; }
        .active-duty { background-color: #3b82f6 !important; color: white !important; border-color: #2563eb !important; }
        .active-leave { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        .active-scatter { background-color: #eab308 !important; color: white !important; border-color: #ca8a04 !important; }
        .active-stay { background-color: #f97316 !important; color: white !important; border-color: #ea580c !important; }
        .active-training { background-color: #a855f7 !important; color: white !important; border-color: #9333ea !important; }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }

        .training-chip {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #f3e8ff;
            color: #7e22ce;
            border: 1px solid #e9d5ff;
            margin-right: 4px;
            margin-bottom: 4px;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-100 text-slate-800">

    <div id="app" class="max-w-xl mx-auto min-h-screen flex flex-col">
        <!-- 導航 -->
        <nav class="bg-white border-b border-gray-200 flex sticky top-0 z-40 shadow-sm">
            <button onclick="switchTab('report')" id="tab-report" class="flex-1 py-4 text-sm font-black transition-all border-b-4 border-blue-600 text-blue-600 bg-blue-50/20">
                點名回報
            </button>
            <button onclick="switchTab('manage')" id="tab-manage" class="flex-1 py-4 text-sm font-black transition-all border-b-4 border-transparent text-gray-400">
                名單管理
            </button>
        </nav>

        <main class="p-4 flex-1 space-y-4">
            <!-- 分頁：點名回報 -->
            <div id="page-report" class="space-y-4">
                
                <!-- 控制面板 -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">點名日期</span>
                            <input type="text" id="reportDate" class="border-none outline-none font-black py-1 w-20 text-blue-600 text-lg bg-transparent" oninput="updateReport()">
                        </div>
                        <div class="flex bg-gray-100 p-1 rounded-lg gap-1">
                            <button onclick="setTimeSlot('早點名')" id="ts-早點名" class="ts-btn px-4 py-2 rounded-md text-xs font-bold text-gray-500">早</button>
                            <button onclick="setTimeSlot('午點名')" id="ts-午點名" class="ts-btn px-4 py-2 rounded-md text-xs font-bold text-gray-500">午</button>
                            <button onclick="setTimeSlot('晚點名')" id="ts-晚點名" class="ts-btn px-4 py-2 rounded-md text-xs font-bold bg-white shadow-sm text-blue-600">晚</button>
                        </div>
                    </div>
                    
                    <button onclick="resetAllToPresent()" class="w-full py-3 bg-red-50 text-red-600 border border-red-100 rounded-xl text-xs font-bold flex items-center justify-center gap-2 active:bg-red-100 transition-colors">
                        🔄 一鍵重製為「全部實到」
                    </button>
                </div>

                <!-- 人員名單 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 px-4 py-2 text-[10px] font-black text-gray-400 border-b flex justify-between tracking-tighter">
                        <span>人員姓名</span>
                        <span>實 / 值 / 休 / 散 / 宿 / 訓</span>
                    </div>
                    <div id="memberList" class="divide-y divide-gray-100">
                        <!-- JS 動態生成 -->
                    </div>
                </div>

                <!-- 底部預覽區域 (現在改在這裡) -->
                <div class="bg-slate-900 rounded-2xl p-5 shadow-xl mt-6">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-slate-400 font-black tracking-widest uppercase">回報內容預覽</span>
                        <span id="presentLabel" class="text-xs text-green-400 font-bold"></span>
                    </div>
                    <textarea id="reportPreview" readonly class="w-full h-64 bg-transparent border-none text-slate-100 text-sm leading-relaxed resize-none outline-none font-mono mb-4"></textarea>
                    <button onclick="copyReport()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                        📋 複製報告文字
                    </button>
                </div>
            </div>

            <!-- 分頁：名單管理 -->
            <div id="page-manage" class="hidden bg-white rounded-xl p-6 border border-gray-200 animate-in fade-in duration-300">
                <h2 class="text-lg font-black mb-1">人員編制編輯</h2>
                <p class="text-xs text-gray-400 mb-4">使用頓號「、」或換行區隔姓名。</p>
                <textarea id="rawNames" class="w-full h-80 p-4 border border-gray-200 rounded-xl focus:border-blue-400 outline-none text-base font-bold mb-4 shadow-inner leading-relaxed"></textarea>
                <button onclick="saveNames()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">更新名單並儲存</button>
            </div>
        </main>

        <!-- 複製用隱藏區塊 -->
        <textarea id="hiddenCopyArea" style="position: absolute; left: -9999px; opacity: 0;"></textarea>
        <div id="toast" class="toast">✓ 已複製報告</div>
    </div>

    <script>
        // 初始化日期
        const now = new Date();
        const initialDate = `${now.getMonth() + 1}/${now.getDate()}`;

        // 初始名單
        let memberNames = ["陳修德", "郭亮彣", "陳育晟", "徐崑洧", "陳冠堯", "廖晨洋", "王崇諺", "張榕峻", "張廷緯", "蔡泓佑", "楊柏均", "徐文聰", "張巧妮", "陳韋君", "張皓淳", "李佾澄", "林家豪", "黃啓峰", "李芃葦", "孫子睿", "黃正安", "陳箴", "謝竣荏", "黃大誠", "張容瑄", "林祐成", "蕭承祐"];
        
        let members = [];
        let timeSlot = '晚點名';
        let trainingHistory = []; // 歷史訓期

        function init() {
            document.getElementById('reportDate').value = initialDate;
            
            // 從 LocalStorage 載入名單
            const saved = localStorage.getItem('fire_members_final');
            if (saved) memberNames = JSON.parse(saved);

            // 初始化物件
            members = memberNames.map(name => ({
                name,
                status: 'present',
                tName: '',
                tTime: ''
            }));

            // 預設帶入特定人員狀態 (以範例為準)
            members.forEach(m => {
                if (m.name === "楊柏均" || m.name === "王崇諺") { m.status = 'training'; m.tName = '航校士高班'; m.tTime = '115.03.09-115.06.12'; }
                else if (m.name === "孫子睿") { m.status = 'training'; m.tName = '大車訓'; m.tTime = '115.03.23-115.05.01'; }
                else if (["陳修德", "徐崑洧", "蔡泓佑", "張榕峻", "張皓淳", "黃啓峰", "謝竣荏", "黃大誠", "黃正安"].includes(m.name)) m.status = 'leave';
                else if (["張廷緯", "李佾澄", "林家豪"].includes(m.name)) m.status = 'scatter';
                else if (["郭亮彣", "徐文聰"].includes(m.name)) m.status = 'stay';
                else if (["陳育晟", "廖晨洋", "陳冠堯", "張巧妮", "陳韋君", "李芃葦", "陳箴", "張容瑄"].includes(m.name)) m.status = 'duty';
            });

            document.getElementById('rawNames').value = memberNames.join('、');
            updateHistory();
            renderList();
            updateReport();
        }

        // 強制重製功能
        function resetAllToPresent() {
            // 直接遍歷修改，確保狀態被刷掉
            for(let i=0; i<members.length; i++) {
                members[i].status = 'present';
            }
            renderList();
            updateReport();
            // 自動滾動到最下方看效果
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchTab(tab) {
            document.getElementById('page-report').classList.toggle('hidden', tab !== 'report');
            document.getElementById('page-manage').classList.toggle('hidden', tab !== 'manage');
            
            document.getElementById('tab-report').className = tab === 'report' ? 'flex-1 py-4 text-sm font-black border-b-4 border-blue-600 text-blue-600 bg-blue-50/20' : 'flex-1 py-4 text-sm font-black border-b-4 border-transparent text-gray-400';
            document.getElementById('tab-manage').className = tab === 'manage' ? 'flex-1 py-4 text-sm font-black border-b-4 border-blue-600 text-blue-600 bg-blue-50/20' : 'flex-1 py-4 text-sm font-black border-b-4 border-transparent text-gray-400';
        }

        function setTimeSlot(slot) {
            timeSlot = slot;
            document.querySelectorAll('.ts-btn').forEach(btn => btn.className = 'ts-btn px-4 py-2 rounded-md text-xs font-bold text-gray-500');
            document.getElementById('ts-' + slot).className = 'ts-btn px-4 py-2 rounded-md text-xs font-bold bg-white shadow-sm text-blue-600';
            updateReport();
        }

        function setStatus(idx, status) {
            if (status === 'training' && !members[idx].tName && trainingHistory.length > 0) {
                members[idx].tName = trainingHistory[0].name;
                members[idx].tTime = trainingHistory[0].time;
            }
            members[idx].status = status;
            renderList();
            updateReport();
        }

        function updateHistory() {
            const seen = new Set();
            const list = [];
            members.forEach(m => {
                if (m.status === 'training' && m.tName) {
                    const key = `${m.tName}-${m.tTime}`;
                    if(!seen.has(key)) {
                        seen.add(key);
                        list.push({ name: m.tName, time: m.tTime });
                    }
                }
            });
            trainingHistory = list;
        }

        function applyHistory(idx, name, time) {
            members[idx].tName = name;
            members[idx].tTime = time;
            renderList();
            updateReport();
        }

        function updateTraining(idx, field, val) {
            members[idx][field] = val;
            updateHistory();
            updateReport();
        }

        function renderList() {
            const listContainer = document.getElementById('memberList');
            listContainer.innerHTML = '';
            
            members.forEach((m, idx) => {
                const item = document.createElement('div');
                item.className = `px-4 py-4 flex flex-col gap-3 transition-colors ${m.status !== 'present' ? 'bg-blue-50/20' : ''}`;
                
                let trainingFields = '';
                if (m.status === 'training') {
                    trainingFields = `
                        <div class="mt-2 p-3 bg-purple-50 rounded-xl border border-purple-100 flex flex-col gap-3">
                            <div class="flex flex-wrap">
                                ${trainingHistory.map(h => `<span onclick="applyHistory(${idx},'${h.name}','${h.time}')" class="training-chip">${h.name}</span>`).join('')}
                            </div>
                            <div class="flex flex-col gap-2">
                                <div class="flex items-center bg-white px-2 rounded border border-purple-200">
                                    <span class="text-[10px] font-bold text-purple-400 mr-2 shrink-0">訓名:</span>
                                    <input type="text" value="${m.tName}" oninput="updateTraining(${idx},'tName',this.value)" class="flex-1 text-sm py-1 font-bold outline-none bg-transparent">
                                </div>
                                <div class="flex items-center bg-white px-2 rounded border border-purple-200">
                                    <span class="text-[10px] font-bold text-purple-400 mr-2 shrink-0">日期:</span>
                                    <input type="text" value="${m.tTime}" oninput="updateTraining(${idx},'tTime',this.value)" class="flex-1 text-sm py-1 font-bold outline-none bg-transparent">
                                </div>
                            </div>
                        </div>
                    `;
                }

                item.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-slate-700 w-16 text-base">${m.name}</span>
                        <div class="grid grid-cols-6 gap-1 flex-1 ml-4 max-w-[280px]">
                            <button onclick="setStatus(${idx},'present')" class="status-btn ${m.status==='present'?'active-present':''}">實</button>
                            <button onclick="setStatus(${idx},'duty')" class="status-btn ${m.status==='duty'?'active-duty':''}">值</button>
                            <button onclick="setStatus(${idx},'leave')" class="status-btn ${m.status==='leave'?'active-leave':''}">休</button>
                            <button onclick="setStatus(${idx},'scatter')" class="status-btn ${m.status==='scatter'?'active-scatter':''}">散</button>
                            <button onclick="setStatus(${idx},'stay')" class="status-btn ${m.status==='stay'?'active-stay' : ''}">宿</button>
                            <button onclick="setStatus(${idx},'training')" class="status-btn ${m.status==='training'?'active-training':''}">訓</button>
                        </div>
                    </div>
                    ${trainingFields}
                `;
                listContainer.appendChild(item);
            });
        }

        function updateReport() {
            const dateStr = document.getElementById('reportDate').value;
            const joinNames = (arr) => arr.map(m => m.name).join('、');
            
            const trGroups = {};
            members.forEach(m => {
                if (m.status === 'training') {
                    const key = `${m.tName.trim()}||${m.tTime.trim()}`;
                    if(!trGroups[key]) trGroups[key] = [];
                    trGroups[key].push(m);
                }
            });

            let out = `${dateStr}消防分隊報告(${timeSlot}情況)：\n`;
            out += `應到：${members.length}員\n`;
            
            Object.keys(trGroups).forEach(k => {
                const [n, t] = k.split('||');
                if(n || t) out += `${n || '受訓'}：${trGroups[k].length}員（${joinNames(trGroups[k])}${t}）\n`;
            });

            const categories = [{id:'leave',l:'休假'},{id:'scatter',l:'外散'},{id:'stay',l:'外宿'},{id:'duty',l:'值班'}];
            categories.forEach(c => {
                const list = members.filter(m => m.status === c.id);
                if(list.length > 0) out += `${c.l}：${list.length}員（${joinNames(list)}）\n`;
            });

            const presentOnes = members.filter(m => m.status === 'present');
            out += `實到：${presentOnes.length}員（${joinNames(presentOnes)}）\n\n`;
            out += `（人員不參加統一點名，於消防分隊實施）`;

            document.getElementById('reportPreview').value = out;
            document.getElementById('hiddenCopyArea').value = out;
            document.getElementById('presentLabel').innerText = `實到: ${presentOnes.length} 員`;
        }

        function copyReport() {
            const area = document.getElementById('hiddenCopyArea');
            area.select();
            area.setSelectionRange(0, 9999);
            document.execCommand('copy');
            
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 1500);
        }

        function saveNames() {
            const raw = document.getElementById('rawNames').value;
            const list = raw.split(/[、,\s\n]+/).filter(n => n.trim() !== "");
            if(list.length > 0) {
                localStorage.setItem('fire_members_final', JSON.stringify(list));
                memberNames = list;
                init();
                switchTab('report');
                window.scrollTo(0,0);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
